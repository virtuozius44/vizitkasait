<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АвтоСертАктау</title>
    <link rel="shortcut icon" href="logo01.svg"  type="image/x-icon">
    <style>
    /* Убираем все лишние отступы */
    * { box-sizing: border-box; }
    
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        overflow: hidden; /* Чтобы не было полос прокрутки */
    }

    /* Главный контейнер с фоном */
    .main-container {
        position: relative;
        width: 100%;
        height: 100vh;
        z-index: 1;
        overflow: hidden; /* Критично важно, чтобы элементы не вылезали за края */

        /* !!! НАСТРОЙКИ КАРТИНКИ И АНИМАЦИИ ДЛЯ МАШИНЫ !!! */
        background: url('car1.png') no-repeat right 5% center; 
        background-size: 50%; /* Размер машины */
        
        /* Применяем анимацию выезда справа: имя | длительность | задержка | плавность | сохранение финала */
        animation: slideInFromRight 1.6s 0.2s ease-out forwards;
    }

    /* !!! ОПИСАНИЕ АНИМАЦИИ ДЛЯ МАШИНЫ (ВЫЕЗД СПРАВА) !!! */
    @keyframes slideInFromRight {
        0% {
            opacity: 0;
            /* Начинаем далеко справа за пределами экрана */
            background-position: right -50% center; 
        }
        100% {
            opacity: 1;
            /* Приезжаем в конечную точку ( right 5% center) */
            background-position: right 5% center; 
        }
    }

    /* Блок с текстом слева */
    .content {
        position: absolute;
        left: 0;
        top: 0;
        width: 40%; /* Занимает 40% ширины экрана слева */
        height: 100%;
        background: linear-gradient(to right, rgba(0,0,0,1) 70%, rgba(0,0,0,0)); /* Плавный переход */
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 5%;
        z-index: 2;

        /* !!! ПРИМЕНЯЕМ АНИМАЦИЮ ВЫЕЗДА СЛЕВА ДЛЯ ТЕКСТА !!! */
        animation: slideInFromLeft 1.4s 0s ease-out forwards;
    }

    /* !!! ОПИСАНИЕ АНИМАЦИИ ДЛЯ ТЕКСТА (ВЫЕЗД СЛЕВА) !!! */
    @keyframes slideInFromLeft {
        0% {
            opacity: 0;
            /* Начинаем за пределами экрана слева (-100%) */
            transform: translateX(-100%);
        }
        100% {
            opacity: 1;
            /* Приезжаем в нормальное положение */
            transform: translateX(0);
        }
    }

    h1 { font-size: 3rem; margin: 0; color: #fff; }
    p { font-size: 1.2rem; color: #ccc; margin: 20px 0; }

    .links { display: flex; flex-direction: column; gap: 15px; }
    
    .btn {
        display: inline-block;
        width: fit-content;
        padding: 12px 30px;
        border: 1px solid #555;
        color: #fff;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: 0.3s;
    }

    .btn:hover {
        background: #fff;
        color: #000;
    }

    /* Экран загрузки (из прошлого шага) */
    #loader {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: #000;
        display: flex; justify-content: center; align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
    }

    .spinner {
        width: 50px; height: 50px;
        border: 3px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-hidden { opacity: 0; pointer-events: none; }

        /* Для мобильных телефонов */
    @media (max-width: 768px) {    
        body, html {
            overflow-y: auto; 
        }

        .main-container { 
            /* Центрируем машину сверху, увеличиваем размер до 90% для видимости */
            background-position: center top 15%; 
            background-size: 90% auto;
            animation: fadeInSimple 1s 0s ease forwards;
            display: flex;
            flex-direction: column;
        }
        
        @keyframes fadeInSimple { 0% {opacity:0;} 100% {opacity:1;} }

        .content { 
            position: relative;
            width: 100%; 
            height: auto; 
            margin-top: 35vh; 
            
            /* ИСПРАВЛЕНИЯ ДЛЯ ЦЕНТРИРОВАНИЯ */
            padding-left: 0;   /* Явно убираем 5% отступа из десктопной версии */
            padding-right: 0;  /* Обнуляем правый отступ для симметрии */
            left: 0;           /* Гарантируем, что блок стоит с самого края */
            transform: none;   /* Сбрасываем возможные сдвиги от анимаций */
            
            background: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0));
            padding-top: 20px;
            padding-bottom: 20px;
            
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
            animation: fadeInSimple 1.2s 0s ease forwards;
        }

        h1 { font-size: 2.2rem; width: 100%; }
        p { margin: 10px 0 20px 0; width: 100%; }

        /* ИСПРАВЛЕНИЕ КНОПОК */
        .links { 
            width: 100%; 
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрирует кнопки горизонтально */
            gap: 12px;
        }

        .btn {
            width: 90%; /* Кнопки на 90% ширины экрана */
            max-width: 300px; /* Ограничение, чтобы не были слишком огромными */
            text-align: center;
            padding: 15px 0; /* Увеличиваем область нажатия */
            box-sizing: border-box;
        }
    }

   
</style>
</head>
<body>
    <div id="loader">
    <div class="spinner"></div>
</div>

    <div class="main-container">
        <div class="content">
            <h1>AutoCertAktau</h1>
            <p>Оформление СБКТС <br> и электронных паспортов (ЭПТС)</p>
            
            <div class="links">
                <a href="https://wa.me/77023332801" target="_blank" class="btn">Написать в WhatsApp</a>
                <a href="https://go.2gis.com/1WArP" target="_blank" class="btn">2Gis</a>
                <a href="tel:+77023332801" class="btn">+7 (702) 333-28-01</a>
            </div>
        </div>
    </div>

<script>
    window.addEventListener('load', function() {
        const loader = document.getElementById('loader');
        
        // Добавляем класс для плавного исчезновения
        loader.classList.add('loader-hidden');

        // Полностью удаляем элемент из DOM после завершения анимации (0.5s), 
        // чтобы он не мешал кликам, даже будучи прозрачным
        setTimeout(() => {
            loader.style.display = 'none';
        }, 500);
    });
</script>

</body>
</html>
